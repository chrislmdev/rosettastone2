# CloudPrism static UI — large CSV uploads may hit the browser→API path; this also
# allows future reverse-proxy use without default 1m body limit surprises.
server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    client_max_body_size 100m;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
